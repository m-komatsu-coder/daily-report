<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>営業日報 — 建設業向け</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1a3a5c;
  --navy-mid:#2563a8;
  --navy-light:#e8f0fb;
  --accent:#e07b2a;
  --ok:#1d9e75;
  --ok-light:#e1f5ee;
  --warn:#ba7517;
  --warn-light:#faeeda;
  --gray:#f5f4f0;
  --border:#e0ded9;
  --text:#222;
  --sub:#888;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;background:#f0eeea;color:var(--text);min-height:100vh;}

/* ===== LAYOUT ===== */
.app{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--navy);color:#fff;padding:0 20px;display:flex;align-items:center;height:52px;gap:16px;flex-shrink:0;}
.topbar-logo{font-size:15px;font-weight:600;letter-spacing:.02em;}
.topbar-logo small{font-size:10px;font-weight:400;opacity:.65;margin-left:6px;}
.topbar-user{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:13px;opacity:.85;}
.avatar{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;}

.body{display:flex;flex:1;}

/* ===== SIDEBAR ===== */
.sidebar{width:200px;background:#fff;border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:var(--sub);cursor:pointer;transition:background .1s;}
.nav-item:hover{background:var(--gray);}
.nav-item.on{background:var(--navy-light);color:var(--navy);font-weight:600;border-right:3px solid var(--navy);}
.nav-icon{width:16px;height:16px;border-radius:4px;background:currentColor;opacity:.4;flex-shrink:0;}

/* ===== MAIN ===== */
.main{flex:1;padding:24px;overflow-y:auto;}
.page{display:none;}
.page.on{display:block;}
.page-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:20px;}

/* ===== CARDS ===== */
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}

/* ===== METRICS ===== */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.mcard{background:var(--gray);border-radius:8px;padding:14px 16px;}
.ml{font-size:11px;color:var(--sub);margin-bottom:4px;}
.mv{font-size:22px;font-weight:600;color:var(--text);}
.ms{font-size:11px;color:var(--sub);margin-top:2px;}

/* ===== TABLE ===== */
.tbl-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--gray);padding:10px 14px;text-align:left;font-weight:600;color:var(--sub);font-size:11px;border-bottom:1px solid var(--border);}
td{padding:11px 14px;border-bottom:1px solid #f5f4f0;color:var(--text);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafaf8;}
.td-site{font-weight:500;}
.td-body{font-size:12px;color:var(--sub);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ===== BADGES ===== */
.badge{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:500;white-space:nowrap;}
.s-initial{background:#e6f1fb;color:#185fa5;}
.s-negotiating{background:var(--warn-light);color:var(--warn);}
.s-quote{background:#fef3e8;color:#c06010;}
.s-order{background:var(--ok-light);color:var(--ok);}
.s-lost{background:#fcebeb;color:#a32d2d;}

/* ===== FORM ===== */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
.form-group label{font-size:12px;font-weight:500;color:var(--sub);}
.form-group label .req{color:#e24b4a;margin-left:2px;}
.form-group input,.form-group select,.form-group textarea{
  border:1px solid var(--border);border-radius:8px;padding:9px 12px;
  font-size:13px;background:#fff;color:var(--text);
  font-family:inherit;outline:none;transition:border .15s;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--navy-mid);}
.form-group textarea{resize:vertical;min-height:80px;}

.chips{display:flex;gap:8px;flex-wrap:wrap;}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--gray);color:var(--sub);transition:all .1s;}
.chip.on-initial{background:var(--navy-light);color:var(--navy);border-color:var(--navy);}
.chip.on-negotiating{background:var(--warn-light);color:var(--warn);border-color:var(--warn);}
.chip.on-quote{background:#fef3e8;color:#c06010;border-color:#c06010;}
.chip.on-order{background:var(--ok-light);color:var(--ok);border-color:var(--ok);}
.chip.on-lost{background:#fcebeb;color:#a32d2d;border-color:#a32d2d;}

.submit-btn{width:100%;padding:13px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .1s;font-family:inherit;}
.submit-btn:hover{background:#122d4a;}

.toast{display:none;padding:12px 16px;background:var(--ok-light);border:1px solid var(--ok);border-radius:8px;color:var(--ok);font-size:13px;font-weight:500;margin-top:12px;}

/* ===== REPORT CARDS (mobile style list) ===== */
.report-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .1s;}
.report-card:hover{border-color:var(--navy-mid);}
.rc-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;}
.rc-date{background:var(--navy-light);color:var(--navy);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:500;white-space:nowrap;}
.rc-site{font-size:14px;font-weight:600;flex:1;}
.rc-body{font-size:12px;color:var(--sub);line-height:1.5;margin-bottom:6px;}
.rc-meta{display:flex;gap:12px;font-size:11px;color:var(--sub);}
.rc-amount{color:var(--accent);font-weight:500;}

/* ===== SEARCH BAR ===== */
.search-row{display:flex;gap:10px;margin-bottom:16px;}
.search-row input{flex:1;border:1px solid var(--border);border-radius:20px;padding:8px 14px;font-size:13px;background:#fff;font-family:inherit;outline:none;}
.search-row input:focus{border-color:var(--navy-mid);}
.search-row select{border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;background:#fff;font-family:inherit;outline:none;}

/* ===== PROGRESS BAR ===== */
.prog-wrap{background:var(--border);border-radius:3px;height:6px;overflow:hidden;width:100px;}
.prog-fill{height:100%;border-radius:3px;background:var(--navy-mid);}

/* ===== MOBILE NAV ===== */
@media(max-width:640px){
  .sidebar{display:none;}
  .mobile-nav{display:flex!important;}
  .main{padding:16px;}
  .form-grid{grid-template-columns:1fr;}
  .form-group.full{grid-column:1;}
  .topbar{height:48px;}
  .metrics{grid-template-columns:1fr 1fr;}
  table th:nth-child(3),table td:nth-child(3),
  table th:nth-child(6),table td:nth-child(6){display:none;}
}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);z-index:100;}
.mn-item{flex:1;padding:8px 4px 12px;text-align:center;font-size:10px;color:var(--sub);cursor:pointer;}
.mn-item.on{color:var(--navy);font-weight:600;}
.mn-icon{width:20px;height:20px;margin:0 auto 3px;border-radius:4px;background:currentColor;opacity:.3;}
.mn-item.on .mn-icon{opacity:1;background:var(--navy);}
@media(max-width:640px){.main{padding-bottom:80px;}}

/* ===== MEMBER TABLE ===== */
.member-tbl{width:100%;border-collapse:collapse;font-size:13px;}
.member-tbl th{background:var(--gray);padding:10px 14px;text-align:left;font-weight:600;color:var(--sub);font-size:11px;border-bottom:1px solid var(--border);}
.member-tbl td{padding:12px 14px;border-bottom:1px solid #f5f4f0;color:var(--text);}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-logo">営業日報<small>建設業向け デモ</small></div>
    <div class="topbar-user">
      <div class="avatar" id="user-avatar">山田</div>
      <span id="user-name">山田 太郎</span>
    </div>
  </div>

  <div class="body">
    <div class="sidebar">
      <div class="nav-item on" data-page="dashboard"><div class="nav-icon"></div>ダッシュボード</div>
      <div class="nav-item" data-page="input"><div class="nav-icon"></div>日報入力</div>
      <div class="nav-item" data-page="list"><div class="nav-icon"></div>日報一覧</div>
      <div class="nav-item" data-page="admin"><div class="nav-icon"></div>管理者ダッシュボード</div>
    </div>

    <div class="main">

      <!-- DASHBOARD -->
      <div class="page on" id="page-dashboard">
        <div class="page-title">ダッシュボード</div>
        <div class="metrics">
          <div class="mcard"><div class="ml">今月の日報件数</div><div class="mv" id="m-count">0</div><div class="ms">件</div></div>
          <div class="mcard"><div class="ml">商談中案件</div><div class="mv" id="m-neg">0</div><div class="ms">件</div></div>
          <div class="mcard"><div class="ml">今月受注金額</div><div class="mv" id="m-order">¥0</div></div>
          <div class="mcard"><div class="ml">見積提出</div><div class="mv" id="m-quote">0</div><div class="ms">件</div></div>
        </div>
        <div class="page-title" style="font-size:13px;margin-bottom:12px;">最近の日報</div>
        <div id="dash-list"></div>
      </div>

      <!-- INPUT -->
      <div class="page" id="page-input">
        <div class="page-title">日報入力</div>
        <div class="card">
          <div class="form-grid">
            <div class="form-group">
              <label>日付<span class="req">*</span></label>
              <input type="date" id="f-date">
            </div>
            <div class="form-group">
              <label>担当者<span class="req">*</span></label>
              <select id="f-member">
                <option>山田 太郎</option>
                <option>鈴木 花子</option>
                <option>田中 一郎</option>
                <option>佐藤 美咲</option>
              </select>
            </div>
            <div class="form-group full">
              <label>訪問先・現場名<span class="req">*</span></label>
              <input type="text" id="f-site" placeholder="例：〇〇建設 名古屋支店 / △△マンション新築現場">
            </div>
            <div class="form-group full">
              <label>商談内容・進捗</label>
              <textarea id="f-content" placeholder="今日の商談内容、先方の反応、課題など"></textarea>
            </div>
            <div class="form-group full">
              <label>進捗ステータス</label>
              <div class="chips" id="chips">
                <div class="chip on-initial" data-val="initial" onclick="selectChip(this)">初回訪問</div>
                <div class="chip" data-val="negotiating" onclick="selectChip(this)">商談中</div>
                <div class="chip" data-val="quote" onclick="selectChip(this)">見積提出</div>
                <div class="chip" data-val="order" onclick="selectChip(this)">受注</div>
                <div class="chip" data-val="lost" onclick="selectChip(this)">失注</div>
              </div>
            </div>
            <div class="form-group">
              <label>見積金額（円）</label>
              <input type="number" id="f-quote" placeholder="例：3500000">
            </div>
            <div class="form-group">
              <label>受注金額（円）</label>
              <input type="number" id="f-order" placeholder="受注確定時のみ">
            </div>
            <div class="form-group full">
              <label>翌日の予定</label>
              <textarea id="f-next" placeholder="明日の訪問先・準備事項など" style="min-height:60px;"></textarea>
            </div>
          </div>
          <button class="submit-btn" onclick="submitReport()">日報を提出する</button>
          <div class="toast" id="toast">日報を提出しました！</div>
        </div>
      </div>

      <!-- LIST -->
      <div class="page" id="page-list">
        <div class="page-title">日報一覧</div>
        <div class="search-row">
          <input type="text" placeholder="現場名・担当者で検索..." id="search-q" oninput="renderList()">
          <select id="search-status" onchange="renderList()">
            <option value="">すべて</option>
            <option value="initial">初回訪問</option>
            <option value="negotiating">商談中</option>
            <option value="quote">見積提出</option>
            <option value="order">受注</option>
            <option value="lost">失注</option>
          </select>
        </div>
        <div id="report-list"></div>
      </div>

      <!-- ADMIN -->
      <div class="page" id="page-admin">
        <div class="page-title">管理者ダッシュボード</div>
        <div class="metrics">
          <div class="mcard"><div class="ml">今月の日報件数</div><div class="mv" id="a-count">0</div></div>
          <div class="mcard"><div class="ml">商談中案件</div><div class="mv" id="a-neg">0</div></div>
          <div class="mcard"><div class="ml">今月受注金額</div><div class="mv" id="a-order">¥0</div></div>
          <div class="mcard"><div class="ml">受注率</div><div class="mv" id="a-rate">0%</div></div>
        </div>
        <div class="card">
          <div class="page-title" style="font-size:13px;margin-bottom:14px;">メンバー別 活動状況</div>
          <div class="tbl-wrap">
            <table class="member-tbl">
              <thead><tr><th>担当者</th><th>日報数</th><th>商談中</th><th>受注金額</th><th>達成度</th></tr></thead>
              <tbody id="admin-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="mobile-nav" id="mobile-nav">
    <div class="mn-item on" data-page="dashboard"><div class="mn-icon"></div>ホーム</div>
    <div class="mn-item" data-page="input"><div class="mn-icon"></div>入力</div>
    <div class="mn-item" data-page="list"><div class="mn-icon"></div>一覧</div>
    <div class="mn-item" data-page="admin"><div class="mn-icon"></div>管理者</div>
  </div>
</div>

<script>
const STATUS_LABEL = {initial:'初回訪問',negotiating:'商談中',quote:'見積提出',order:'受注',lost:'失注'};
const STATUS_CLASS = {initial:'s-initial',negotiating:'s-negotiating',quote:'s-quote',order:'s-order',lost:'s-lost'};
const MEMBERS = ['山田 太郎','鈴木 花子','田中 一郎','佐藤 美咲'];

let reports = [
  {id:1,date:'2026-04-22',member:'山田 太郎',site:'〇〇建設 名古屋本社',content:'外壁塗装案件の追加提案。先方担当者の反応は良好。価格交渉が必要。',status:'negotiating',quote:4500000,order:0,next:'見積書修正版を提出予定'},
  {id:2,date:'2026-04-21',member:'鈴木 花子',site:'△△マンション新築現場（春日井）',content:'現場確認と資材確認。施工会社との打ち合わせ完了。追加工事の可能性あり。',status:'quote',quote:2200000,order:0,next:'施工スケジュール確認'},
  {id:3,date:'2026-04-21',member:'田中 一郎',site:'◇◇工務店 豊田支店',content:'初回訪問。担当の加藤部長と面談。リノベーション案件の相談あり。',status:'initial',quote:0,order:0,next:'資料送付・再訪問調整'},
  {id:4,date:'2026-04-20',member:'山田 太郎',site:'★★ハウス 刈谷営業所',content:'受注確定。契約書サイン完了。着工は来月予定。',status:'order',quote:6800000,order:6500000,next:'工程表の作成・手配'},
  {id:5,date:'2026-04-19',member:'佐藤 美咲',site:'●●産業 安城倉庫',content:'屋根防水工事の提案。競合他社も入っており価格勝負になりそう。',status:'negotiating',quote:3100000,order:0,next:'競合情報収集'},
];
let selectedStatus = 'initial';
let nextId = 6;

function fmt(n){return n?'¥'+n.toLocaleString():'';}
function fmtM(n){if(!n)return '¥0';if(n>=1000000)return '¥'+(n/1000000).toFixed(1)+'M';return '¥'+n.toLocaleString();}

function badge(s){return `<span class="badge ${STATUS_CLASS[s]}">${STATUS_LABEL[s]}</span>`;}

function switchPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('on'));
  document.querySelectorAll('.mn-item').forEach(n=>n.classList.remove('on'));
  document.getElementById('page-'+id).classList.add('on');
  document.querySelectorAll('[data-page="'+id+'"]').forEach(el=>el.classList.add('on'));
  if(id==='dashboard') renderDashboard();
  if(id==='list') renderList();
  if(id==='admin') renderAdmin();
}

document.querySelectorAll('.nav-item,.mn-item').forEach(el=>{
  el.addEventListener('click',()=>switchPage(el.dataset.page));
});

function selectChip(el){
  document.querySelectorAll('.chip').forEach(c=>{c.className='chip';});
  selectedStatus=el.dataset.val;
  el.classList.add('on-'+selectedStatus);
}

function renderDashboard(){
  const neg=reports.filter(r=>r.status==='negotiating').length;
  const ord=reports.filter(r=>r.status==='order').reduce((s,r)=>s+r.order,0);
  const quo=reports.filter(r=>r.status==='quote').length;
  document.getElementById('m-count').textContent=reports.length;
  document.getElementById('m-neg').textContent=neg;
  document.getElementById('m-order').textContent=fmtM(ord);
  document.getElementById('m-quote').textContent=quo;
  const el=document.getElementById('dash-list');
  el.innerHTML=reports.slice(0,5).map(r=>`
    <div class="report-card">
      <div class="rc-top">
        <span class="rc-date">${r.date.replace(/-/g,'/')}</span>
        <span class="rc-site">${r.site}</span>
        ${badge(r.status)}
      </div>
      <div class="rc-body">${r.content}</div>
      <div class="rc-meta">
        <span>${r.member}</span>
        ${r.quote?`<span>見積：<span class="rc-amount">${fmt(r.quote)}</span></span>`:''}
        ${r.order?`<span>受注：<span class="rc-amount">${fmt(r.order)}</span></span>`:''}
        ${r.next?`<span>明日：${r.next}</span>`:''}
      </div>
    </div>`).join('');
}

function renderList(){
  const q=(document.getElementById('search-q').value||'').toLowerCase();
  const s=document.getElementById('search-status').value;
  const filtered=reports.filter(r=>
    (!q||r.site.toLowerCase().includes(q)||r.member.toLowerCase().includes(q))&&
    (!s||r.status===s)
  );
  const el=document.getElementById('report-list');
  if(!filtered.length){el.innerHTML='<p style="color:var(--sub);font-size:13px;padding:20px 0;">該当する日報がありません</p>';return;}
  el.innerHTML=filtered.map(r=>`
    <div class="report-card">
      <div class="rc-top">
        <span class="rc-date">${r.date.replace(/-/g,'/')}</span>
        <span class="rc-site">${r.site}</span>
        ${badge(r.status)}
      </div>
      <div class="rc-body">${r.content}</div>
      <div class="rc-meta">
        <span>${r.member}</span>
        ${r.quote?`<span>見積：<span class="rc-amount">${fmt(r.quote)}</span></span>`:''}
        ${r.order?`<span>受注：<span class="rc-amount">${fmt(r.order)}</span></span>`:''}
        ${r.next?`<span>明日：${r.next}</span>`:''}
      </div>
    </div>`).join('');
}

function renderAdmin(){
  const neg=reports.filter(r=>r.status==='negotiating').length;
  const ord=reports.filter(r=>r.status==='order').reduce((s,r)=>s+r.order,0);
  const total=reports.length;
  const orderCount=reports.filter(r=>r.status==='order').length;
  const rate=total?Math.round(orderCount/total*100):0;
  document.getElementById('a-count').textContent=total;
  document.getElementById('a-neg').textContent=neg;
  document.getElementById('a-order').textContent=fmtM(ord);
  document.getElementById('a-rate').textContent=rate+'%';
  const tbody=document.getElementById('admin-tbody');
  tbody.innerHTML=MEMBERS.map(m=>{
    const mine=reports.filter(r=>r.member===m);
    const mord=mine.filter(r=>r.status==='order').reduce((s,r)=>s+r.order,0);
    const mneg=mine.filter(r=>r.status==='negotiating').length;
    const pct=Math.min(100,Math.round(mord/5000000*100));
    return `<tr>
      <td>${m}</td>
      <td>${mine.length}件</td>
      <td>${mneg}件</td>
      <td>${fmtM(mord)}</td>
      <td><div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div></td>
    </tr>`;
  }).join('');
}

function submitReport(){
  const site=document.getElementById('f-site').value.trim();
  const member=document.getElementById('f-member').value;
  const date=document.getElementById('f-date').value;
  if(!site){document.getElementById('f-site').focus();return;}
  reports.unshift({
    id:nextId++,date,member,site,
    content:document.getElementById('f-content').value||'（内容なし）',
    status:selectedStatus,
    quote:Number(document.getElementById('f-quote').value)||0,
    order:Number(document.getElementById('f-order').value)||0,
    next:document.getElementById('f-next').value
  });
  const toast=document.getElementById('toast');
  toast.style.display='block';
  setTimeout(()=>toast.style.display='none',3000);
  document.getElementById('f-site').value='';
  document.getElementById('f-content').value='';
  document.getElementById('f-next').value='';
  document.getElementById('f-quote').value='';
  document.getElementById('f-order').value='';
  document.querySelectorAll('.chip').forEach(c=>c.className='chip');
  document.querySelector('.chip[data-val="initial"]').classList.add('on-initial');
  selectedStatus='initial';
}

// init
const d=new Date();
document.getElementById('f-date').value=d.toISOString().split('T')[0];
renderDashboard();
</script>
</body>
</html>
